<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: pagina(${titulo}, ~{::conteudo})}">
<body>
<div th:fragment="conteudo" class="card">
    <h1>Cadastro de Aluno</h1>

    <p th:if="${erroDuplicado == 'cpf'}" class="alerta-erro">
        Este CPF já está cadastrado.
    </p>
    <p th:if="${erroDuplicado == 'email'}" class="alerta-erro">
        Este e-mail já está em uso.
    </p>
    <p th:if="${erroDuplicado == 'login'}" class="alerta-erro">
        Este login já está em uso.
    </p>

    <form action="/alunos/cadastro" method="POST">
        <label>
            Nome completo
            <input type="text" name="nome" maxlength="120" required
                   th:value="${form != null} ? ${form.nome()} : ''">
        </label>
        <label>
            E-mail
            <input type="email" name="email" maxlength="120" required
                   th:value="${form != null} ? ${form.email()} : ''">
        </label>
        <label>
            CPF (apenas números, 11 dígitos)
            <input type="text" name="cpf" pattern="\d{11}" maxlength="11" required
                   th:value="${form != null} ? ${form.cpf()} : ''">
        </label>
        <label>
            RG
            <input type="text" name="rg" maxlength="20" required
                   th:value="${form != null} ? ${form.rg()} : ''">
        </label>
        <label>
            Endereço
            <input type="text" name="endereco" maxlength="255" required
                   th:value="${form != null} ? ${form.endereco()} : ''">
        </label>
        <label>
            Curso
            <input type="text" name="curso" maxlength="120" required
                   th:value="${form != null} ? ${form.curso()} : ''">
        </label>
        <label>
            Instituição de ensino
            <select name="instituicaoId" required>
                <option value="">— Selecione —</option>
                <option th:each="i : ${instituicoes}"
                        th:value="${i.id}"
                        th:text="${i.nome}"
                        th:selected="${form != null and form.instituicaoId() == i.id}"></option>
            </select>
        </label>
        <label>
            Login
            <input type="text" name="login" maxlength="80" required autocomplete="username"
                   th:value="${form != null} ? ${form.login()} : ''">
        </label>
        <label>
            Senha (mínimo 6 caracteres)
            <input type="password" name="senha" minlength="6" maxlength="100" required autocomplete="new-password">
        </label>

        <button type="submit">Cadastrar</button>
    </form>

    <p class="rodape-form">Já tem cadastro? <a href="/login">Entrar</a>.</p>
</div>
</body>
</html>
