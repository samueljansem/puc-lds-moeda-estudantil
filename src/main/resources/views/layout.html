<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:fragment="pagina(titulo, conteudo)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${titulo} + ' — Moeda Estudantil'">Moeda Estudantil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
    <header class="topo">
        <a href="/" class="marca">
            <svg viewBox="0 0 40 40" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="18.5" fill="#cf4f2c"/>
                <circle cx="20" cy="20" r="15" fill="none" stroke="#fff" stroke-opacity="0.5" stroke-width="1"/>
                <text x="20" y="27.6" text-anchor="middle" font-family="Georgia, serif" font-size="21" font-weight="700" fill="#fff">M</text>
            </svg>
            Moeda Estudantil
        </a>
        <th:block th:with="autenticado=${security != null}">
            <nav th:if="${autenticado}">
                <span class="usuario" th:text="${security.name}">usuario</span>
                <a href="/alunos/vantagens">Catálogo</a>
                <a href="/perfil">Meu Perfil</a>
                <form action="/logout" method="POST" class="form-logout">
                    <button type="submit">Sair</button>
                </form>
            </nav>
            <nav th:unless="${autenticado}">
                <a href="/login">Entrar</a>
                <a href="/alunos/cadastro">Cadastrar como Aluno</a>
                <a href="/empresas/cadastro">Cadastrar Empresa</a>
            </nav>
        </th:block>
    </header>
    <main class="container">
        <div th:replace="${conteudo}"></div>
    </main>
    <footer>
        <p>Sistema de Moeda Estudantil — PUC Minas</p>
    </footer>
</body>
</html>
