<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: pagina(${titulo}, ~{::conteudo})}">
<body>
<div th:fragment="conteudo" class="card">
    <h1>Meu Extrato</h1>

    <p th:if="${sucesso}" class="alerta-sucesso">
        Transferência realizada com sucesso.
    </p>

    <div class="saldo-card">
        <div class="saldo-card-info">
            <span class="saldo-card-label">Saldo atual</span>
            <div class="saldo-card-valor">
                <strong th:text="${professor.saldo}">0</strong>
                <span>moedas</span>
            </div>
        </div>
    </div>

    <table class="tabela-extrato" th:if="${!linhas.isEmpty()}">
        <thead>
            <tr>
                <th>Data</th>
                <th>Destinatário</th>
                <th>Valor</th>
                <th>Motivo</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="l : ${linhas}">
                <td th:text="${#temporals.format(l.data(), 'dd/MM/yyyy HH:mm')}">—</td>
                <td th:text="${l.descricao()}">—</td>
                <td th:text="${l.valor()}" class="valor-negativo">0</td>
                <td th:text="${l.referencia()}">—</td>
            </tr>
        </tbody>
    </table>

    <div th:if="${linhas.isEmpty()}" class="vazio">
        <div class="vazio-icone">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M22 2L11 13"/>
                <path d="M22 2l-7 20-4-9-9-4z"/>
            </svg>
        </div>
        <p class="vazio-titulo">Sem transferências</p>
        <p>Você ainda não enviou moedas a nenhum aluno. Quando enviar, o histórico aparece aqui.</p>
    </div>

    <div class="acoes">
        <a class="botao" href="/professores/transferir">Nova transferência</a>
        <a class="botao-secundario" href="/professores/perfil">Voltar ao perfil</a>
    </div>
</div>
</body>
</html>
