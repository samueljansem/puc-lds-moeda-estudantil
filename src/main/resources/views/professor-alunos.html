<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: pagina(${titulo}, ~{::conteudo})}">
<body>
<div th:fragment="conteudo" class="card">
    <h1 th:text="${titulo}">Alunos da Instituição</h1>

    <table class="tabela-extrato" th:if="${!alunos.isEmpty()}">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Curso</th>
                <th>E-mail</th>
                <th>Saldo</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="a : ${alunos}">
                <td th:text="${a.nome}">—</td>
                <td th:text="${a.curso}">—</td>
                <td th:text="${a.email}">—</td>
                <td th:text="${a.saldo + ' moedas'}">0</td>
            </tr>
        </tbody>
    </table>

    <div th:if="${alunos.isEmpty()}" class="vazio">
        <div class="vazio-icone">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="9" cy="8" r="3"/>
                <path d="M3 20c0-3 3-5 6-5s6 2 6 5"/>
                <circle cx="17" cy="8" r="2.5"/>
                <path d="M14 20c0-2 2-4 5-4"/>
            </svg>
        </div>
        <p class="vazio-titulo">Sem alunos cadastrados</p>
        <p>Nenhum aluno se cadastrou na sua instituição ainda.</p>
    </div>

    <div class="acoes">
        <a class="botao-secundario" href="/professores/perfil">Voltar ao perfil</a>
    </div>
</div>
</body>
</html>
