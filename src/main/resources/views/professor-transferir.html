<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: pagina(${titulo}, ~{::conteudo})}">
<body>
<div th:fragment="conteudo" class="card">
    <h1>Transferir Moedas</h1>

    <div class="saldo-card">
        <div class="saldo-card-info">
            <span class="saldo-card-label">Saldo disponível</span>
            <div class="saldo-card-valor">
                <strong th:text="${professor.saldo}">0</strong>
                <span>moedas</span>
            </div>
        </div>
    </div>

    <p th:if="${erro == 'saldoInsuficiente'}" class="alerta-erro">
        Saldo insuficiente para realizar a transferência.
    </p>
    <p th:if="${erro == 'dadosInvalidos'}" class="alerta-erro"
       th:text="${detalheErro != null} ? ${detalheErro} : 'Dados inválidos.'">
        Dados inválidos.
    </p>

    <form action="/professores/transferir" method="POST" th:if="${!alunos.isEmpty()}">
        <label>
            Aluno destinatário
            <select name="alunoId" required>
                <option value="">— Selecione um aluno —</option>
                <option th:each="a : ${alunos}"
                        th:value="${a.id}"
                        th:text="${a.nome + ' (' + a.curso + ')'}"
                        th:selected="${form != null and form.alunoId() == a.id}"></option>
            </select>
        </label>
        <label>
            Valor (moedas)
            <input type="number" name="valor" min="1" required
                   th:value="${form != null} ? ${form.valor()} : ''">
        </label>
        <label>
            Motivo (obrigatório)
            <textarea name="motivo" maxlength="500" rows="3" required
                      th:text="${form != null} ? ${form.motivo()} : ''"></textarea>
        </label>
        <button type="submit">Enviar moedas</button>
        <a class="botao-secundario" href="/professores/perfil">Cancelar</a>
    </form>

    <div th:if="${alunos.isEmpty()}" class="vazio">
        <div class="vazio-icone">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="9" cy="8" r="3"/>
                <path d="M3 20c0-3 3-5 6-5s6 2 6 5"/>
                <circle cx="17" cy="8" r="2.5"/>
                <path d="M14 20c0-2 2-4 5-4"/>
            </svg>
        </div>
        <p class="vazio-titulo">Sem destinatários</p>
        <p>Ainda não há alunos cadastrados na sua instituição para receber moedas.</p>
        <div class="acoes">
            <a class="botao-secundario" href="/professores/perfil">Voltar ao perfil</a>
        </div>
    </div>
</div>
</body>
</html>
