<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: pagina(${titulo}, ~{::conteudo})}">
<body>
<div th:fragment="conteudo" class="card">
    <h1>Meu Perfil</h1>

    <dl class="dados">
        <dt>Nome</dt>   <dd th:text="${empresa.nome}"></dd>
        <dt>E-mail</dt> <dd th:text="${empresa.email}"></dd>
        <dt>CNPJ</dt>   <dd th:text="${empresa.cnpj}"></dd>
    </dl>

    <a class="botao" href="/empresas/editar">Editar perfil</a>
</div>
</body>
</html>
