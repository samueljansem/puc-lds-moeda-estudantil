<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: pagina(${titulo}, ~{::conteudo})}">
<body>
<div th:fragment="conteudo" class="card">
    <h1>Meu Perfil</h1>

    <dl class="dados">
        <dt>Nome</dt>   <dd th:text="${empresa.nome}"></dd>
        <dt>E-mail</dt> <dd th:text="${empresa.email}"></dd>
        <dt>CNPJ</dt>   <dd th:text="${empresa.cnpj}"></dd>
    </dl>

    <div class="acoes">
        <a class="botao" href="/empresas/vantagens">Minhas vantagens</a>
        <a class="botao-secundario" href="/empresas/editar">Editar perfil</a>
        <a class="botao-secundario" href="/trocar-senha">Trocar senha</a>
        <a class="botao-secundario" href="/notificacoes">Notificações</a>
    </div>

    <form action="/empresas/desativar" method="POST" class="form-desativar"
          onsubmit="return confirm('Tem certeza? Sua conta será desativada e você não conseguirá mais fazer login.');">
        <button type="submit" class="link-perigoso">Desativar minha conta</button>
    </form>
</div>
</body>
</html>
