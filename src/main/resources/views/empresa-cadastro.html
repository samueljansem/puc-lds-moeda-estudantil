<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: pagina(${titulo}, ~{::conteudo})}">
<body>
<div th:fragment="conteudo" class="card">
    <h1>Cadastro de Empresa Parceira</h1>

    <p th:if="${erroDuplicado == 'cnpj'}" class="alerta-erro">
        Este CNPJ já está cadastrado.
    </p>
    <p th:if="${erroDuplicado == 'email'}" class="alerta-erro">
        Este e-mail já está em uso.
    </p>
    <p th:if="${erroDuplicado == 'login'}" class="alerta-erro">
        Este login já está em uso.
    </p>

    <form action="/empresas/cadastro" method="POST">
        <label>
            Nome da empresa
            <input type="text" name="nome" maxlength="120" required
                   th:value="${form != null} ? ${form.nome()} : ''">
        </label>
        <label>
            E-mail de contato
            <input type="email" name="email" maxlength="120" required
                   th:value="${form != null} ? ${form.email()} : ''">
        </label>
        <label>
            CNPJ (apenas números, 14 dígitos)
            <input type="text" name="cnpj" pattern="\d{14}" maxlength="14" required
                   th:value="${form != null} ? ${form.cnpj()} : ''">
        </label>
        <label>
            Login
            <input type="text" name="login" maxlength="80" required autocomplete="username"
                   th:value="${form != null} ? ${form.login()} : ''">
        </label>
        <label>
            Senha (mínimo 6 caracteres)
            <input type="password" name="senha" minlength="6" maxlength="100" required autocomplete="new-password">
        </label>

        <button type="submit">Cadastrar</button>
    </form>

    <p class="rodape-form">Já tem cadastro? <a href="/login">Entrar</a>.</p>
</div>
</body>
</html>
