<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: pagina(${titulo}, ~{::conteudo})}">
<body>
<div th:fragment="conteudo" class="card">
    <h1>Editar Perfil</h1>

    <p th:if="${erroDuplicado == 'email'}" class="alerta-erro">
        Este e-mail já está em uso por outro cadastro.
    </p>

    <p class="aviso">CNPJ não pode ser alterado.</p>

    <form action="/empresas/editar" method="POST">
        <label>
            Nome da empresa
            <input type="text" name="nome" maxlength="120" required
                   th:value="${empresa.nome}">
        </label>
        <label>
            E-mail
            <input type="email" name="email" maxlength="120" required
                   th:value="${empresa.email}">
        </label>
        <button type="submit">Salvar</button>
        <a class="botao-secundario" href="/empresas/perfil">Cancelar</a>
    </form>
</div>
</body>
</html>
