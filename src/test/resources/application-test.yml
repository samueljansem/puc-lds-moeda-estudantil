micronaut:
  http:
    client:
      follow-redirects: false

datasources:
  default:
    url: "jdbc:h2:mem:testDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
    dialect: H2

flyway:
  datasources:
    default:
      enabled: true
      clean-disabled: false

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: validate
